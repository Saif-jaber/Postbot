<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Postbot</title>
  <meta name="description" content="" />
  <link rel="stylesheet" href="CSS/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <aside>
        <nav>
            <div class="sidebar-header">
              <img src="images/logo.svg" alt="logo of postbot" class="logo"/>
              <button type="button" class="collapse-btn" id="collapse-btn">
                <img src="images/sidebar close gray.png" alt="Toggle sidebar" id="collapse-icon" />
              </button>
            </div>
            <ul>
               <li>
                 <div>
                   <img src="images/new chat gray.png" alt="new chat icon" />
                   <h1>New Chat</h1>
                 </div>
               </li>
               <li>
                 <div>
                   <img src="images/search gray.png" alt="search chats icon" />
                   <h1>Search Chats</h1>
                 </div>
               </li>
               <li>
                 <div>
                   <img src="images/history gray.png" alt="history icon button" />
                   <h1>History</h1>
                 </div>
             
                 <!-- Scrollable chat history container nested inside the History li -->
                 <div class="chat-history-scroll">
                   <!-- Chat history tabs go here -->
                 </div>
               </li>
             </ul>
             <!-- Account info section -->
             <div class="profile-section">
               <img src="images/profile-user.png" alt="profile picture" />
               <h1>Guest</h1>
             </div>
        </nav>
    </aside>
    
    <script src="JS/mainPage.js"></script>
</body>
</html>
